<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Lojinha Linda</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Lojinha Outfit</h1>
    
    <div class="container">

        <div class="produto">
            <img src="Imagens/OIP.webp" alt="BONÉ">
            <h3>Boné</h3>
            <p>R$ 59,99</p>
            <button onclick="adicionar('Boné', 59,99)">Adicionar</button>
        </div>

        <div class="produto">
            <img src="Imagens/51POYnG3gDL._AC_SX425_.jpg" alt="CAMISA">
            <h3>Camiseta</h3>
            <p>R$ 74,99</p>
            <button onclick="adicionar('Camiseta', 74 ,99)">Adicionar</button>
        </div>

        <div class="produto">
           <img src="Imagens/calca.jpg" alt="CALÇA">
            <h3>Calça</h3>
            <p>R$ 69,99</p>
            <button onclick="adicionar('Calça', 69,99)">Adicionar</button>
        </div>

        <div class="produto">
            <img src="Imagens/174-1458-006_zoom2.webp" alt="SAPATÊNIS">
            <h3>Tênis</h3>
            <p>R$ 219,99</p>
            <button onclick="adicionar('Sapatênis', 219,99)">Adicionar</button>
        </div>

        <div class="produto">
            <img src="Imagens/Mochila.webp" alt="MOCHILA">
            <h3>Mochila</h3>
            <p>R$ 149,99</p>
            <button onclick="adicionar('Mochila', 149,99)">Adicionar</button>
        </div>

    </div>

    <div id="carrinhoBox">
        <h3>🧾 Carrinho</h3>

        <h2>Itens: <span id="quantidade">0</span></h2>
        <h2>Total: R$ <span id="total">0</span></h2>
        <div id="lista"></div>
    </div>

    <script src="script.js"></script>

</body>

</html>
